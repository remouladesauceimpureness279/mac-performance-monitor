name: CI

# Build, test, and lint on every push and pull request. This workflow uses no
# secrets and does no code signing, so any contributor can fork the repository
# and get green CI out of the box.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-lint:
    name: Build, test, lint
    runs-on: macos-15
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Lint
        run: swift format lint --strict --recursive Sources Tests Package.swift
