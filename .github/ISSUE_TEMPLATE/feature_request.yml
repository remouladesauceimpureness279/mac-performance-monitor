name: Feature request
description: Suggest an idea or improvement for MacPerfMonitor
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve
      description: >
        Describe the need or the gap. What are you trying to understand about
        your Mac's memory that MacPerfMonitor does not show today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like MacPerfMonitor to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about.
    validations:
      required: false
  - type: checkboxes
    id: principles
    attributes:
      label: Fit with the project
      options:
        - label: This keeps MacPerfMonitor local and free of telemetry.
        - label: This fits the pressure-first mental model.
