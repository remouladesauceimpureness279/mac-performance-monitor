name: Bug report
description: Report something that is not working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report. Please do not include any
        sensitive data from your system in this issue.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug and what you expected instead.
      placeholder: When I open the process explorer, ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the problem?
      placeholder: |
        1. Open MacPerfMonitor
        2. Go to ...
        3. See ...
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "14.5"
    validations:
      required: true
  - type: input
    id: hardware
    attributes:
      label: Mac hardware
      placeholder: "MacBook Pro, M1 Pro"
    validations:
      required: false
  - type: input
    id: macperfmonitor-version
    attributes:
      label: MacPerfMonitor version or commit
      placeholder: "0.1.0 or a commit hash"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: >
        Optionally include output from
        `log show --predicate 'subsystem == "uk.co.bzwrd.macperfmonitor"' --last 5m`.
        Review it first and remove anything you do not want to share.
      render: shell
    validations:
      required: false
